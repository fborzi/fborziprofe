name: Keep Supabase Alive

on:
  # Se ejecuta automáticamente cada 5 días a la medianoche
  schedule:
    - cron: '0 0 */5 * *'
  # Permite ejecutarlo manualmente desde la pestaña "Actions" de GitHub
  workflow_dispatch:

jobs:
  ping_supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Health Endpoint
        env:
          # Usamos la URL y la llave pública guardadas en los secrets de GitHub
          SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Error: Faltan los secrets (URL o ANON_KEY) en la configuración de GitHub."
            exit 1
          fi
          
          echo "Haciendo ping a la base de datos de Supabase para evitar que se pause..."
          
          # Hacemos una petición GET a la tabla 'exercises' (PostgREST)
          # Esto despierta a la base de datos PostgreSQL real, asegurando la actividad
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -H "apikey: $SUPABASE_ANON_KEY" -H "Authorization: Bearer $SUPABASE_ANON_KEY" "$SUPABASE_URL/rest/v1/exercises?select=id&limit=1")
          
          if [ "$HTTP_STATUS" -eq 200 ]; then
            echo "Ping a la BD exitoso. Estado HTTP: $HTTP_STATUS. El proyecto sigue activo."
            echo "Error en el ping. Estado HTTP: $HTTP_STATUS"
            exit 1
          fi
